query FindManyEmailTemplates($page: PageInput!, $search: EmailTemplateSearchInput) {
    findManyEmailTemplates(page: $page, search: $search) {
        list {
            ...EmailTemplate
        }
        page
        size
        total
    }
}

query FindOneEmailTemplateById($id: Int!) {
    findOneEmailTemplateById(id: $id) {
        ...EmailTemplate
    }
}

mutation CreateEmailTemplate($input: CreateEmailTemplateInput!) {
    createEmailTemplate(input: $input) {
        ...EmailTemplate
    }
}

mutation ModifyEmailTemplate($id: Int!, $input: ModifyEmailTemplateInput!) {
    modifyEmailTemplate(id: $id, input: $input) {
        ...EmailTemplate
    }
}